serenity {
  # ─── Browser Configuration ───────────────────────────────────────────────────
  driver = chrome

  # ─── Serenity Reports ────────────────────────────────────────────────────────
  project.name = "Serenity BDD Automation Framework"
  outputDirectory = target/site/serenity
  reportsDir = target/site/serenity

  # ─── Screenshots ─────────────────────────────────────────────────────────────
  take.screenshots = FOR_FAILURES   # Options: FOR_EACH_ACTION | BEFORE_AND_AFTER_EACH_STEP | AFTER_EACH_STEP | FOR_FAILURES
  screenshots.dir = target/site/serenity/screenshots

  # ─── Timeouts ────────────────────────────────────────────────────────────────
  timeout = 5                        # seconds – implicit wait
  webdriver.timeouts.implicitlywait = 5000
  webdriver.wait.for.timeout = 10000 # ms – explicit wait (WebDriverWait)

  # ─── Environment-specific overrides (use -Denvironment=staging) ───────────────
  # Run with: mvn verify -Denvironment=staging
  environments {
    default {
      webdriver.base.url = "https://www.saucedemo.com"
    }
    staging {
      webdriver.base.url = "https://staging.saucedemo.com"
    }
    production {
      webdriver.base.url = "https://www.saucedemo.com"
    }
  }
}

# ─── WebDriver / Chrome Options ────────────────────────────────────────────────
webdriver {
  driver = chrome
  autodownload = true       # WebDriverManager auto-download

  chrome {
    switches = """--no-sandbox;
                  --disable-dev-shm-usage;
                  --disable-gpu;
                  --window-size=1920,1080"""
  }

  firefox {
    switches = """--width=1920; --height=1080"""
  }
}
